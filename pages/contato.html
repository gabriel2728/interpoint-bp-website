<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <!-- Configurações básicas da página -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InterPoint BP - Contato</title>

  <!-- Arquivo de estilos da página -->
  <link rel="stylesheet" href="../css/contato.css">

</head>

<body>

  <!-- Barra superior -->
  <header class="topo">
    <!-- Barra visual decorativa -->
  </header>


  <!-- Menu de navegação -->
  <nav class="navbar">

    <!-- Campo de busca -->
    <div class="search-box">
      <input type="text" placeholder="Pesquisar...">
    </div>

    <!-- Links principais do site -->
    <div class="links">
      <a href="produtos.html">Produtos e Serviços</a>
      <a href="planos.html">Planos</a>
      <a href="contato.html">Contato</a>
      <a href="sobre.html">Sobre a empresa</a>
      <a href="login.html">Login e Cadastro</a>
    </div>

  </nav>

  <!-- Logo da empresa -->
  <img src="../img/logo.png" alt="Logo InterPoint BP" class="logo-abaixo">


  <!-- Conteúdo principal da página -->
  <main class="conteudo">
    <div class="contato-container">
      <h1>Fale Conosco</h1>

      <!-- Informações de contato -->
      <div class="contato-info">
        <p><strong>Email:</strong> atendimento@interpointbp.com.br</p>
        <p><strong>Telefone:</strong> (11) 91234-5678</p>
        <p><strong>Endereço:</strong> Rua das Conexões, 123 - São Paulo/SP</p>
      </div>

      <!-- Formulário de contato -->
      <form>

        <input 
          type="text" 
          name="nome" 
          placeholder="Seu nome" 
          required>

        <input 
          type="email" 
          name="email" 
          placeholder="Seu email" 
          required>

        <textarea 
          name="mensagem" 
          rows="5" 
          placeholder="Sua mensagem" 
          required>
        </textarea>

        <button type="submit" class="btn">
          Enviar
        </button>

      </form>

      <!-- Mapa de localização -->
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.171244339143!2d-46.65657178447394!3d-23.593202468595526!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c5d2c745e3%3A0x71e6c7f7e3f6d8a1!2sPaulista%20Avenue%2C%20S%C3%A3o%20Paulo%20-%20SP!5e0!3m2!1sen!2sbr!4v1600000000000!5m2!1sen!2sbr"
        allowfullscreen
        loading="lazy">
      </iframe>

    </div>

  </main>

  <!-- Rodapé -->
  <footer>

    <p>Siga-nos:</p>

    <a href="https://facebook.com" target="_blank">Facebook</a> |
    <a href="https://twitter.com" target="_blank">Twitter</a> |
    <a href="https://instagram.com" target="_blank">Instagram</a>

    <p>&copy; 2025 InterPoint BP. Todos os direitos reservados.</p>

  </footer>

</body>
</html>
