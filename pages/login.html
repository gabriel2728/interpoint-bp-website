<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- Configurações básicas da página -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InterPoint BP - Login e Cadastro</title>

  <!-- Arquivo de estilos -->
  <link rel="stylesheet" href="../css/login.css">

</head>

<body>

  <!-- Barra superior decorativa -->
  <header class="topo"></header>


  <!-- Menu de navegação -->
  <nav class="navbar">

    <!-- Campo de pesquisa -->
    <div class="search-box">
      <input type="text" placeholder="Pesquisar...">
    </div>

    <!-- Links principais -->
    <div class="links">
      <a href="produtos.html">Produtos e Serviços</a>
      <a href="planos.html">Planos</a>
      <a href="contato.html">Contato</a>
      <a href="sobre.html">Sobre a Empresa</a>
      <a href="login.html">Login e Cadastro</a>
    </div>

  </nav>


  <!-- Logo da empresa -->
  <img src="../img/logo.png" alt="Logo InterPoint BP" class="logo-abaixo">


  <!-- Conteúdo principal -->
  <main class="conteudo">

    <div class="form-container">

      <!-- Formulário de Login -->
      <form action="#" method="post">

        <h2>Login</h2>

        <label for="email-login">Email</label>
        <input 
          type="email" 
          id="email-login" 
          name="email-login" 
          required
        >

        <label for="senha-login">Senha</label>
        <input 
          type="password" 
          id="senha-login" 
          name="senha-login" 
          required
        >

        <button type="submit" class="btn">
          Entrar
        </button>

      </form>


      <!-- Formulário de Cadastro -->
      <form action="#" method="post">

        <h2>Cadastro</h2>

        <label for="nome">Nome Completo</label>
        <input 
          type="text" 
          id="nome" 
          name="nome" 
          required
        >

        <label for="email-cadastro">Email</label>
        <input 
          type="email" 
          id="email-cadastro" 
          name="email-cadastro" 
          required
        >

        <label for="senha-cadastro">Senha</label>
        <input 
          type="password" 
          id="senha-cadastro" 
          name="senha-cadastro" 
          required
        >

        <label for="confirmar-senha">Confirmar Senha</label>
        <input 
          type="password" 
          id="confirmar-senha" 
          name="confirmar-senha" 
          required
        >

        <button type="submit" class="btn">
          Cadastrar
        </button>

      </form>

    </div>

  </main>

  <!-- Rodapé do site -->
  <footer>

    <p>Siga-nos:</p>

    <a href="https://facebook.com" target="_blank">Facebook</a> |
    <a href="https://twitter.com" target="_blank">Twitter</a> |
    <a href="https://instagram.com" target="_blank">Instagram</a>

    <p>&copy; 2025 InterPoint BP. Todos os direitos reservados.</p>

  </footer>

</body>
</html>
